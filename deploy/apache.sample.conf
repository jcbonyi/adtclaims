# Apache 2.4 + mod_proxy (cPanel/WHM or generic).
# Requires: mod_proxy, mod_proxy_http, mod_ssl (often already enabled).
# Adjust paths, ServerName, SSL cert paths, and the Node port (4000).
#
# cPanel: you may merge these directives via "Include" in the account's
# Apache config, or ask the host to enable proxy for your vhost—shared
# hosts sometimes restrict ProxyPass.

<VirtualHost *:443>
    ServerName YOUR_DOMAIN
    DocumentRoot /home/USER/public_html/claims/dist

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/YOUR_DOMAIN.crt
    SSLCertificateKeyFile /etc/ssl/private/YOUR_DOMAIN.key

    # SPA: serve index.html for client-side routes
    <Directory "/home/USER/public_html/claims/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass        /api http://127.0.0.1:4000/api
    ProxyPassReverse /api http://127.0.0.1:4000/api

    # Large Excel uploads
    LimitRequestBody 10485760
</VirtualHost>
